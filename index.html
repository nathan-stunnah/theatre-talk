<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theatre Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #9B1B30;
    --deep-red: #6B0F1A;
    --velvet: #7D1128;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --cream: #FDF6EC;
    --dark: #1A0508;
    --mid: #3D0A12;
    --text-light: #F5E6D3;
    --text-muted: #C4A882;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text-light);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header { text-align: center; padding: 48px 20px 32px; }
  .app-title { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; color: var(--gold-light); }
  .app-subtitle { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; }

  .stat-bar { display: flex; justify-content: center; gap: 48px; padding: 20px; margin: 0 auto 32px; max-width: 600px; }
  .stat-number { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: var(--gold); }
  .stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
  .stat-divider { width: 1px; background: var(--gold); opacity: 0.2; }

  .action-area { max-width: 800px; margin: 0 auto 40px; padding: 0 20px; display: flex; flex-direction: column; gap: 20px; }
  
  .add-btn {
    background: linear-gradient(135deg, var(--crimson), var(--deep-red));
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    font-size: 0.9rem; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 14px; border-radius: 2px; cursor: pointer; width: 100%;
  }

  /* Search Bar Styles */
  .search-wrap { position: relative; width: 100%; }
  .search-input {
    width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(201,168,76,0.2);
    padding: 12px 12px 12px 40px; border-radius: 2px; color: var(--text-light); font-size: 0.95rem; outline: none;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; }

  .grid-section { padding: 0 20px 60px; max-width: 800px; margin: 0 auto; }
  .show-list { display: flex; flex-direction: column; gap: 12px; }
  .show-item {
    background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(201,168,76,0.1);
    padding: 20px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
  }
  .show-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--cream); margin-bottom: 4px; }
  .show-meta { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
  .star-display { color: var(--gold); font-size: 1rem; letter-spacing: 2px; }
  .delete-btn { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 0.75rem; opacity: 0.6; margin-top: 8px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal { background: #1A0508; border: 1px solid var(--gold); width: 100%; max-width: 480px; padding: 32px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  input[type="text"], input[type="date"] {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.3);
    padding: 12px; color: var(--text-light); outline: none;
  }

  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0; background: #2A0810;
    border: 1px solid var(--gold); max-height: 180px; overflow-y: auto; display: none; z-index: 200;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item { padding: 12px; cursor: pointer; }
  .autocomplete-item:hover { background: rgba(201,168,76,0.1); }

  .star-input { display: flex; gap: 8px; }
  .star-btn { background: none; border: none; font-size: 2rem; cursor: pointer; color: rgba(201,168,76,0.2); }
  .star-btn.active { color: var(--gold); }

  .submit-btn { width: 100%; background: var(--crimson); border: none; color: white; padding: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
</style>
</head>
<body>

<header>
  <h1 class="app-title">Theatre Talk</h1>
  <p class="app-subtitle">Your personal stage diary</p>
</header>

<div class="stat-bar">
  <div class="stat">
    <div class="stat-number" id="shows-total">0</div>
    <div class="stat-label">Total Shows</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div class="stat-number" id="avg-rating">—</div>
    <div class="stat-label">Avg Rating</div>
  </div>
</div>

<div class="action-area">
  <button class="add-btn" onclick="openModal()">+ Add a Show</button>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-bar" class="search-input" placeholder="Search by show or theatre..." oninput="render()">
  </div>
</div>

<div class="grid-section">
  <div class="show-list" id="show-list"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 style="margin-bottom:20px; font-family:'Playfair Display'">New Performance</h2>
    <div class="form-group">
      <label>Show Title</label>
      <input type="text" id="show-title" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Theatre / Venue</label>
      <div class="autocomplete-wrap">
        <input type="text" id="show-theatre" autocomplete="off" oninput="handleTheatreInput()" onblur="hideAutocomplete()" onfocus="handleTheatreInput()" />
        <div class="autocomplete-list" id="autocomplete-list"></div>
      </div>
    </div>
    <div class="form-group">
      <label>Date Attended</label>
      <input type="date" id="show-date" />
    </div>
    <div class="form-group">
      <label>Your Rating</label>
      <div class="star-input">
        <button class="star-btn" data-val="1" onclick="setRating(1)">★</button>
        <button class="star-btn" data-val="2" onclick="setRating(2)">★</button>
        <button class="star-btn" data-val="3" onclick="setRating(3)">★</button>
        <button class="star-btn" data-val="4" onclick="setRating(4)">★</button>
        <button class="star-btn" data-val="5" onclick="setRating(5)">★</button>
      </div>
    </div>
    <button class="submit-btn" onclick="addShow()">Save Entry</button>
    <button style="background:none; border:none; color:var(--text-muted); width:100%; margin-top:15px; cursor:pointer" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
  const defaultTheatres = [
    "53Two", "Adelphi Theatre", "Criterion Theatre", "Dominion Theatre", 
    "Liverpool Empire", "London Palladium", "Lyric Theatre", "Opera House", 
    "Palace Theatre", "Phoenix Theatre", "Quays Theatre", "Sheffield Crucible", 
    "Sheffield Lyceum", "Troubadour Canary Wharf", "Troubadour Wembley Park"
  ];

  let shows = [];
  let theatres = [...defaultTheatres];
  let currentRating = 0;

  try { 
    const s = localStorage.getItem('theatre-talk-shows'); if (s) shows = JSON.parse(s);
    const t = localStorage.getItem('theatre-talk-theatres'); 
    if (t) theatres = [...new Set([...defaultTheatres, ...JSON.parse(t)])].sort();
  } catch(e) {}

  function save() {
    localStorage.setItem('theatre-talk-shows', JSON.stringify(shows));
    localStorage.setItem('theatre-talk-theatres', JSON.stringify(theatres));
  }

  function handleTheatreInput() {
    const val = document.getElementById('show-theatre').value.trim().toLowerCase();
    const list = document.getElementById('autocomplete-list');
    const matches = theatres.filter(t => t.toLowerCase().includes(val));
    if (!matches.length || !val) { list.classList.remove('open'); return; }
    list.innerHTML = matches.map(t => `<div class="autocomplete-item" onmousedown="selectTheatre('${t}')">${t}</div>`).join('');
    list.classList.add('open');
  }

  function selectTheatre(name) { document.getElementById('show-theatre').value = name; }
  function hideAutocomplete() { setTimeout(() => document.getElementById('autocomplete-list').classList.remove('open'), 150); }

  function openModal() {
    document.getElementById('show-title').value = '';
    document.getElementById('show-theatre').value = '';
    document.getElementById('show-date').value = new Date().toISOString().split('T')[0];
    currentRating = 0; updateStarUI(0);
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
  function handleOverlayClick(e) { if (e.target.id === 'modal-overlay') closeModal(); }
  function setRating(val) { currentRating = val; updateStarUI(val); }
  function updateStarUI(val) { document.querySelectorAll('.star-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.val) <= val)); }

  function addShow() {
    const title = document.getElementById('show-title').value.trim();
    const theatre = document.getElementById('show-theatre').value.trim();
    const date = document.getElementById('show-date').value;
    if (!title || !theatre || !date || !currentRating) return;
    if (!theatres.includes(theatre)) { theatres.push(theatre); theatres.sort(); }
    shows.push({ id: Date.now(), title, theatre, date, rating: currentRating });
    save(); render(); closeModal();
  }

  function deleteShow(id) { shows = shows.filter(s => s.id !== id); save(); render(); }

  function render() {
    const listEl = document.getElementById('show-list');
    const searchQuery = document.getElementById('search-bar').value.toLowerCase();
    
    // Sort and filter
    const displayList = shows
      .filter(s => s.title.toLowerCase().includes(searchQuery) || s.theatre.toLowerCase().includes(searchQuery))
      .sort((a, b) => new Date(b.date) - new Date(a.date));

    // Update Stats
    document.getElementById('shows-total').textContent = shows.length;
    document.getElementById('avg-rating').textContent = shows.length ? (shows.reduce((a, s) => a + s.rating, 0) / shows.length).toFixed(1) : '—';

    if (!displayList.length) {
      listEl.innerHTML = `<div style="text-align:center; opacity:0.5; padding:40px">No shows found.</div>`;
      return;
    }

    listEl.innerHTML = displayList.map(s => `
      <div class="show-item">
        <div>
          <div class="show-title">${s.title}</div>
          <div class="show-meta">${s.theatre} • ${new Date(s.date).toLocaleDateString('en-GB')}</div>
        </div>
        <div style="text-align:right">
          <div class="star-display">${'★'.repeat(s.rating)}${'☆'.repeat(5-s.rating)}</div>
          <button class="delete-btn" onclick="deleteShow(${s.id})">Remove</button>
        </div>
      </div>
    `).join('');
  }

  render();
</script>
</body>
</html>
